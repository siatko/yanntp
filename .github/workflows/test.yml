name: Tests

on:
  push:
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - nvim_version: v0.10.0
            nvim_archive: nvim-linux64.tar.gz
            nvim_dir: nvim-linux64
          - nvim_version: stable
            nvim_archive: nvim-linux-x86_64.tar.gz
            nvim_dir: nvim-linux-x86_64
    steps:
      - uses: actions/checkout@v4

      - name: Install Neovim
        run: |
          wget -q https://github.com/neovim/neovim/releases/download/${{ matrix.nvim_version }}/${{ matrix.nvim_archive }}
          tar xzf ${{ matrix.nvim_archive }}
          sudo mv ${{ matrix.nvim_dir }} /opt/nvim
          echo "/opt/nvim/bin" >> $GITHUB_PATH

      - name: Install plenary.nvim
        run: |
          mkdir -p ~/.local/share/nvim/lazy
          git clone --depth 1 https://github.com/nvim-lua/plenary.nvim ~/.local/share/nvim/lazy/plenary.nvim

      - name: Run tests
        run: make test
